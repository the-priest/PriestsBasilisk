    <!-- Cheek left -->
    <path d="M 80,118 L 68,134 L 76,146 L 90,140 L 96,128 L 90,120 Z"/>

    <!-- Cheek right -->
    <path d="M 176,118 L 188,134 L 180,146 L 166,140 L 160,128 L 166,120 Z"/>

    <!-- Upper jaw -->
    <path d="M 96,140 L 160,140 L 156,168 L 144,180 L 128,186 L 112,180
             L 100,168 Z"/>

    <!-- Mouth cutout -->
