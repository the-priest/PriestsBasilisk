<?xml version="1.0" encoding="UTF-8"?>
<!--
  Placeholder dragon icon: my own stylized interpretation, white on
  black, in the spirit of Kali Linux.  The official Kali Linux dragon
  is OffSec's trademark; for the exact artwork, download the official
  SVG from https://www.kali.org/docs/policy/trademark/ and overwrite
  this file in place — the .desktop entry will pick it up.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">

  <rect width="256" height="256" fill="#000000"/>

  <g fill="#ffffff" fill-rule="evenodd">

    <!-- Top crown -->
    <polygon points="128,10 118,40 138,40"/>

    <!-- Left horn -->
